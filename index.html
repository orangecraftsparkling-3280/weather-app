<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>クリーンお天気ナビ</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="m-0 p-5 min-h-screen flex items-center justify-center box-border bg-slate-100 text-slate-800 font-sans">
    
    <!-- 📱 スマートフォン筐体 -->
    <div class="max-w-[380px] w-full bg-black p-3 rounded-[48px] shadow-[0_25px_60px_rgba(0,0,0,0.25),inset_0_0_4px_2px_rgba(255,255,255,0.2)] border-4 border-zinc-800">
      
      <!-- スマホ画面内部 -->
      <div class="bg-gradient-to-b from-[#7ba1c7] to-[#b3cde3] rounded-[38px] px-5 pt-7 pb-6 overflow-hidden shadow-[inset_0_0_20px_rgba(0,0,0,0.15)] text-center">
        
        <!-- Dynamic Island -->
        <div class="w-[110px] h-7 bg-black rounded-full mx-auto mb-4 mt-[-12px]"></div>
        
        <!-- アプリタイトル -->
        <h1 class="text-xl font-bold text-slate-900 flex items-center justify-center gap-1 mb-0.5 tracking-wider drop-shadow-sm">
          🎣 クリーンお天気ナビ
        </h1>
        <p class="text-[11px] text-slate-700 font-semibold mb-4">釣り人向け気象＆タイドナビ</p>
        
        <!-- ☀️ 現在の状況（メイン表示用カード） -->
        <div class="bg-white/90 rounded-[16px] border border-black/10 p-4 mb-3 shadow-[0_8px_24px_rgba(0,0,0,0.1)]">
          <span class="block text-[10px] font-bold text-slate-500 mb-1">東京 / 現在の状況</span>
          <div id="weather" class="text-3xl font-extrabold text-blue-600 flex items-center justify-center gap-2">
            --
          </div>
        </div>

        <!-- 🌊 [NEW] 潮汐データカード（満潮・干潮） -->
        <div class="bg-gradient-to-r from-sky-900 to-slate-800 text-white rounded-[16px] p-3 mb-3 shadow-md border border-sky-700/50 text-left text-xs">
          <span class="block text-[9px] font-bold text-sky-200 uppercase tracking-widest mb-2 text-center">🌊 本日のタイド（潮汐情報）</span>
          <div class="flex justify-between border-b border-sky-800 pb-1.5 mb-1.5">
            <span class="font-bold text-cyan-300">🔴 満潮</span>
            <span id="high-tide" class="font-mono font-bold">--:--</span>
          </div>
          <div class="flex justify-between">
            <span class="font-bold text-amber-400">🔵 干潮</span>
            <span id="low-tide" class="font-mono font-bold">--:--</span>
          </div>
        </div>
        
        <!-- 📦 2×2の気象データ小窓 -->
        <div class="grid grid-cols-2 gap-2.5 mb-4">
          <div class="relative bg-[#2c323b] text-white p-2.5 rounded-[8px] border-2 border-[#8e7a52] shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
            <span class="block text-[9px] text-amber-200 font-medium mb-0.5 tracking-wider">現在の気温</span>
            <span id="temperature" class="text-base font-bold">--</span>
          </div>
          <div class="relative bg-[#2c323b] text-white p-2.5 rounded-[8px] border-2 border-[#8e7a52] shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
            <span class="block text-[9px] text-amber-200 font-medium mb-0.5 tracking-wider">湿度</span>
            <span id="humidity" class="text-base font-bold">--</span>
          </div>
          <div class="relative bg-[#2c323b] text-white p-2.5 rounded-[8px] border-2 border-[#8e7a52] shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
            <span class="block text-[9px] text-amber-200 font-medium mb-0.5 tracking-wider">風向き</span>
            <span id="wind-direction" class="text-sm font-bold text-emerald-300">--</span>
          </div>
          <div class="relative bg-[#2c323b] text-white p-2.5 rounded-[8px] border-2 border-[#8e7a52] shadow-[inset_0_0_10px_rgba(0,0,0,0.5)]">
            <span class="block text-[9px] text-amber-200 font-medium mb-0.5 tracking-wider">風速</span>
            <span id="wind-speed" class="text-base font-bold">--</span>
          </div>
        </div>

        <!-- 🔄 取得ボタン -->
        <button id="fetch-btn" class="w-full bg-gradient-to-r from-[#1d3557] to-[#457b9d] hover:from-[#457b9d] hover:to-[#1d3557] text-white font-bold py-3 px-4 rounded-xl border border-[#8e7a52] shadow-[0_4px_15px_rgba(29,53,87,0.3)] [text-shadow:1px_1px_2px_rgba(0,0,0,0.5)] transition-all duration-300 active:scale-95 text-xs tracking-widest">
          最新の気象情報を取得
        </button>

      </div>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
