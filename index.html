<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クリーンお天気ナビ</title>
    <!-- CSSファイルを読み込む -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🌦️ クリーンお天気ナビ</h1>
        <p>アーキテクチャを意識した設計で、東京の予報を取得します。</p>
        <button id="fetch-btn">データをダウンロード</button>

        <div class="info-box">
            ファイルが3つに美しく分離されました！<br>
            検証画面の<strong>「コンソール (Console)」</strong>を開いて、ボタンを押してください。
        </div>
    </div>

    <!-- JavaScriptファイルを外部から読み込む（deferを付ける） -->
    <script src="app.js" defer></script>
</body>
</html>
